name: Doer
options:
  bundleIdPrefix: nz.co.doer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_FILE: Doer/Info.plist
    MARKETING_VERSION: "1.62"
    CURRENT_PROJECT_VERSION: "62"

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: "5.9.0"

targets:
  Doer:
    type: application
    platform: iOS
    sources:
      - path: Doer
        excludes:
          - "*.xcassets/AppIcon.appiconset/*.png"
          - GoogleService-Info.plist
      - path: Doer/GoogleService-Info.plist
        type: file
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nz.co.doer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Doer/Info.plist
    dependencies:
      - package: Alamofire
