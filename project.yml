name: Doer
options:
  bundleIdPrefix: nz.co.doer
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
configFiles:
  Debug: Config.xcconfig
  Release: Config.xcconfig
settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: 1
    INFOPLIST_FILE: Doer/Info.plist
    MARKETING_VERSION: "1.62"
    CURRENT_PROJECT_VERSION: "62"

packages:
  Alamofire:
    url: https://github.com/Alamofire/Alamofire
    from: "5.9.0"
  # Pin the Maps SDK to match the Navigation SDK binary (9.1.1). The Nav SDK only
  # requests Maps `from: 9.1.1`, so SwiftPM otherwise drifts to 9.4.0, which dropped
  # the `GoogleMapsBase` module that the Nav 9.1.1 binary still imports → build break.
  ios-maps-sdk:
    url: https://github.com/googlemaps/ios-maps-sdk
    exactVersion: "9.1.1"
  ios-navigation-sdk:
    url: https://github.com/googlemaps/ios-navigation-sdk
    exactVersion: "9.1.1"
  firebase-ios-sdk:
    url: https://github.com/firebase/firebase-ios-sdk
    exactVersion: "12.11.0"

targets:
  Doer:
    type: application
    platform: iOS
    sources:
      - path: Doer
        excludes:
          - "*.xcassets/AppIcon.appiconset/*.png"
          - GoogleService-Info.plist
      - path: Doer/GoogleService-Info.plist
        type: file
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nz.co.doer
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        GENERATE_INFOPLIST_FILE: false
        INFOPLIST_FILE: Doer/Info.plist
        # Wire the push-notification entitlement so the build applies aps-environment.
        # Without this XcodeGen drops it → "no valid aps-environment entitlement" → no APNs/iOS push.
        CODE_SIGN_ENTITLEMENTS: Doer/Doer.entitlements
    dependencies:
      - package: Alamofire
      - package: ios-maps-sdk
        product: GoogleMaps
      - package: ios-navigation-sdk
        product: GoogleNavigation
      - package: firebase-ios-sdk
        product: FirebaseCore
      - package: firebase-ios-sdk
        product: FirebaseCrashlytics
      - package: firebase-ios-sdk
        product: FirebaseMessaging
      - package: firebase-ios-sdk
        product: FirebaseAnalytics
