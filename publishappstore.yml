# pool:
#   vmImage: 'macos-13'
steps:
  - task: InstallAppleCertificate@2
    inputs:
      certSecureFile: 'DistributionCertificate.p12'
      certPwd: 'pawa1@N#'
      keychain: 'temp'
  - task: InstallAppleProvisioningProfile@1
    inputs:
      provisioningProfileLocation: 'secureFiles'
      provProfileSecureFile: 'DoerApp_Distribution_2026_May.mobileprovision'

  - script: |
      echo "List contents of the Build.ArtifactStagingDirectory"
      ls -R $(Build.ArtifactStagingDirectory)
    displayName: 'List artifact directory contents'

  - task: DownloadPipelineArtifact@2
    inputs:
      artifact: 'Doer_IPA'
      targetPath: '$(Pipeline.Workspace)'


# Download the AuthKey file
  - task: DownloadSecureFile@1
    name: authKey
    inputs:
      secureFile: 'AuthKey_5B4Q6KMC52.p8'
    displayName: Download the AuthKey file

  - script: |
       echo "🚀 Starting Upload..."
       echo "📂 Listing workspace contents:"
       ls -R $(Pipeline.Workspace)
       mkdir -p ~/.private_keys
       
       cp "$(authKey.secureFilePath)" ~/.private_keys/AuthKey_5B4Q6KMC52.p8
       echo "✅ AuthKey installed."
       ipa_path=$(find $(Pipeline.Workspace) -name "*.ipa" | head -n 1)
       
       if [ -z "$ipa_path" ]; then
       echo "Error: IPA file not found!"
       exit 1
       fi
       echo "IPA file found: $ipa_path"
       echo "Uploading IPA to App Store Connect"
       xcrun altool --upload-app --type ios --file "$ipa_path" --apiKey "5B4Q6KMC52" --apiIssuer "69a6de8e-e98a-47e3-e053-5b8c7c11a4d1" --key ~/.private_keys/AuthKey_5B4Q6KMC52.p8 --verbose
    displayName: 'Upload IPA to App Store Connect' 
